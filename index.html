<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://firebasestorage.googleapis.com/v0/b/dcit-web.appspot.com/o/a2main.css.css?alt=media&token=372ab3f9-ae18-4058-83ce-2253593a0555">

    <style>
      body {
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: #fafafa;
      }

      nav {
        display: inline-block;
        background-color: white;
        width: 100%;
        height: 54px;
        border-bottom: 1px solid #e5e5e5;
        box-sizing: border-box;
        line-height: 54px;
        padding: 0 20px;
      }

      #logo {
        height: 40px;
        position: relative;
        vertical-align: middle;
      }

      input[type="text"] {
        height: 25px;
        position: relative;
        width: 30vw;
        left: 50%;
        transform: translateX(-50%);
        background-color: #fafafa;
        text-align: center;
        border: 1px solid #b5b5b5;
        border-radius: 3px;
        vertical-align: middle;
      }

      #actions {
        height: 40px;
        position: relative;
        float: right;
        margin-top: 7px;
      }

      #stories {
        height: 90px;
        width: 70vw;
        margin-top: 10px;
        margin-left: auto;
        margin-right: auto;
        border: 1px solid #b5b5b5;
        border-radius: 2px;
        padding-left: 30px;
        background-color: white;
        display: flex;
        align-items: center;
        box-sizing: border-box;
      }

      .user {
        width: 18%;
        display: inline-block;
        text-align: center;
      }

      .user img {
        margin-top: 5px;
        border-radius: 50%;
        border: 4px double #b5b5b5;
        width: 56px;
        height: 56px;
        display: block;
        margin-left: auto;
        margin-right: auto;
        object-fit: cover;
      }

      .user p {
        text-align: center;
        margin: 0;
        font-family: "Lucida Sans Unicode";
        font-weight: 100;
        font-size: smaller;
      }

      .post {
        border: 1px solid #b5b5b5;
        border-radius: 2px;
        height: 60vh;
        width: 560px;
        margin-left: auto;
        margin-right: auto;
        margin-top: 10px;
        background-color: white;
        overflow: hidden;
      }

      .post-header {
        background-color: white;
        height: 50px;
        box-sizing: border-box;
        width: inherit;
        padding: 5px;
        border-bottom: 1px solid #b5b5b5;
        display: flex;
        align-items: center;
      }

      .post-header img {
        height: 40px;
        width: 40px;
        border-radius: 50%;
        border: 4px double #b5b5b5;
        object-fit: cover;
      }

      .post-header span {
        margin-left: 8px;
        font-family: "Lucida Sans Unicode";
        font-size: 14px;
      }

      .post-image {
        width: 100%;
        display: block;
      }
      
    </style>
</head>
<body>
    <nav>
       
        <img id="logo" src="img/instagran.png" alt="instagran logo" >
    
        <input type="text" placeholder="search"/>

        <img id="actions" src="img/actions.png" alt="actions" >
    </nav>

    <section id="stories">
        <div class="user" id="mydiv">
            <img src="img/gran1.jpg" >
            <p class="userstory">Elma</p>
        </div>
        <div class="user">
            <img src="img/gran2.jpg" >
            <p class="userstory">Betty</p>
        </div>
        <div class="user">
            <img src="img/gran3.jpg" >
            <p class="userstory">Sandra</p>
        </div>
        <div class="user">
            <img src="img/gran4.jpg" >
            <p class="userstory">Delores</p>
        </div>

        <div class="user">
            <img src="img/gran5.jpg" >
            <p class="userstory">Karen</p>
        </div>
    </section>

    <section class="post">
        <div class="post-header">
            <img src="img/gran1.jpg"><span>Elma</span>
        </div>
        <div>
            <img class="post-image" src="https://www.placecage.com/g/512/512" alt="cage image">
        </div>
    </section>

    <footer></footer>
</body>
</html>
